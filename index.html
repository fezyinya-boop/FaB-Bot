<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Arena // • Season 1 •</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --white: #ffffff;
            --dim: #444444;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Character Watermark */
        .spirit-bg {
            position: fixed;
            bottom: -5%;
            right: -2%;
            height: 80vh;
            opacity: 0.08;
            z-index: -1;
            filter: grayscale(1) contrast(140%);
            pointer-events: none;
        }

        /* Branding Section */
        .branding {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }

        .trophy-main {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .side-icon {
            font-size: 1.8rem;
            opacity: 0.6;
        }

        /* Original Bold Font */
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(2.5rem, 10vw, 6.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
        }

        .season-tag {
            display: block;
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.6em;
            color: var(--white);
            text-transform: uppercase;
        }

        /* Leaderboard Layout */
        .lb-card {
            width: 100%;
            max-width: 850px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.95);
        }

        /* Centered Header Descriptors */
        .lb-header {
            display: grid;
            grid-template-columns: 1fr 120px 100px;
            background: var(--white);
            padding: 18px 25px;
        }

        .lb-header span {
            color: #000;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center; /* Center text within the column */
        }

        /* Center the first descriptor (Player) specifically to the left-aligned column */
        .lb-header span:first-child { text-align: left; padding-left: 40px; }

        .lb-row {
            display: grid;
            grid-template-columns: 1fr 120px 100px;
            align-items: center;
            padding: 22px 25px;
            border-bottom: 1px solid var(--border);
            transition: 0.2s ease;
        }

        .lb-row:hover {
            background: var(--white);
            color: #000;
        }

        /* Fields */
        .player-col {
            display: flex;
            align-items: center;
            gap: 15px;
            overflow: hidden;
        }

        .pos {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #ffffff !important;
            min-width: 25px;
        }

        .name {
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        /* Centered Rating Data */
        .rating-col {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Centered Rank Data */
        .rank-col {
            display: flex;
            justify-content: center;
        }

        .emblem {
            width: 40px;
            height: 40px;
            vertical-align: middle;
    /* This is the magic line to stop it from being white/grey */
            filter: none !important; 
            -webkit-filter: none !important; 
            opacity: 1 !important;
      }

        .lb-row:hover .emblem {
            filter: grayscale(0) brightness(1);
        }

        /* Mobile Precision */
        @media (max-width: 600px) {
            .side-icon { display: none; }
            h1 { font-size: 3rem; }
            .lb-header, .lb-row { grid-template-columns: 1fr 100px 70px; padding: 15px; }
            .name { font-size: 1.1rem; }
            .rating-col { font-size: 0.9rem; }
            .emblem { width: 32px; height: 32px; }
            .lb-header span:first-child { padding-left: 0; text-align: center; }
        }
    </style>
</head>
<body>

    <img src="https://images.squarespace-cdn.com/content/v1/60f76906a2364c767425ef5f/1630635104068-Y9W00Z9E7Z9Z9Z9Z9Z9Z/Silvie_Spirit.png" class="spirit-bg">

    <div class="branding">
        <span class="trophy-main">🏆</span>
        <div class="title-row">
            <span class="side-icon">🏆</span>
            <h1>Archive Arena</h1>
            <span class="side-icon">🏆</span>
        </div>
        <span class="season-tag">Season 1</span>
    </div>

    <div class="lb-card">
        <div class="lb-header">
            <span>Player</span>
            <span>Rating</span>
            <span>Rank</span>
        </div>
        <div id="lb-content">
            </div>
    </div>

    <script>
    // 1. Replace this with your actual Railway URL
    const API_URL = "https://arena-tracker-agent-production.up.railway.app/api/leaderboard";

    const EMBLEMS = {
        diamond: "https://cdn.discordapp.com/emojis/1477427100666433572.png",
        platinum: "https://cdn.discordapp.com/emojis/1477427675067842588.png",
        gold: "https://cdn.discordapp.com/emojis/1477426026945577000.png",
        silver: "https://cdn.discordapp.com/emojis/1477421174249099416.png",
        bronze: "https://cdn.discordapp.com/emojis/1476994147935322265.png"
    };
        function getRank(points) {
    if (points >= 1800) return 'diamond';
    if (points >= 1600) return 'platinum';
    if (points >= 1400) return 'gold';
    if (points >= 1200) return 'silver';
    return 'bronze';
        }
        

       async function syncLeaderboard() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // Sort data by points (highest first) just in case
            data.sort((a, b) => b.points - a.points);

            const container = document.getElementById('lb-content');
            container.innerHTML = data.map((p, i) => `
                <div class="lb-row">
                    <div class="player-col">
                        <span class="pos">${String(i + 1).padStart(2, '0')}</span>
                        <span class="name">${p.name}</span>
                    </div>
                    <div class="rating-col">${p.points} RP</div>
                    <div class="rank-col">
                        <img src="${EMBLEMS[p.rank] || EMBLEMS.bronze}" class="emblem" alt="${p.rank}">
                    </div>
                </div>
            `).join('');
            
        } catch (err) {
            console.error("Connection to Arena Lost. Retrying...", err);
        }
                }

    // Initial load
    syncLeaderboard();
    
    // Auto-refresh every minute
    setInterval(syncLeaderboard, 60000);
</script>

</body>
</html>
